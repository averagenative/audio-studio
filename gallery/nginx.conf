server {
    listen 80;
    server_name _;

    location / {
        root /srv/gallery;
        index index.html;
    }

    # JSON directory listing of generated audio (self-populating feed)
    location /list/ {
        alias /srv/output/;
        autoindex on;
        autoindex_format json;
        add_header Cache-Control "no-store";
    }

    # The audio files + their .json sidecars
    location /audio/ {
        alias /srv/output/;
        # alpine nginx mime.types has no flac entry -> it would serve as octet-stream
        # and browsers refuse to play it. Declare the audio types we emit here.
        types {
            audio/flac  flac;
            audio/mpeg  mp3;
            audio/wav   wav;
            audio/ogg   ogg opus;
            application/json json;
        }
        default_type application/octet-stream;
        add_header Cache-Control "no-store";
    }
}
